server {
    listen 80;
    server_name sblaichau.vn www.sblaichau.vn;
    
    # Chuyển hướng HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sblaichau.vn www.sblaichau.vn;
    
    # Cấu hình chứng chỉ SSL Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/sblaichau.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sblaichau.vn/privkey.pem;

    root /sblaichau/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent fallback to index.html for missing static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

