server {
    listen 80;
    listen 443 ssl http2;
    server_name sblaichau.vn www.sblaichau.vn;
    
    ssl_certificate /etc/nginx/ssl/kidzlab.edu.vn.pem;
    ssl_certificate_key /etc/nginx/ssl/kidzlab.edu.vn.key;

    root /sblaichau/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent fallback to index.html for missing static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

